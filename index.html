<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Adverse Selection & Market-Making Research</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,Segoe UI,Arial,sans-serif;color:#1a1a1a}
header{padding:14px 22px;background:#1a1f2e;color:#fff}
header h1{margin:0;font-size:18px} header .sub{font-size:12px;color:#9fb0c8;margin-top:3px}
.tabs{display:flex;background:#2b3245;flex-wrap:wrap}
.tabs button{padding:11px 20px;background:transparent;color:#c7d0e0;border:0;border-bottom:3px solid transparent;cursor:pointer;font-size:14px}
.tabs button:hover{color:#fff}
.tabs button.on{color:#fff;border-bottom-color:#4a90d9;font-weight:600;background:#222838}
.note{padding:8px 22px;background:#f4f6fb;font-size:12px;color:#566;border-bottom:1px solid #e3e7ef}
iframe{width:100%;height:calc(100vh - 118px);border:0;display:block}
.note b{color:#234}
</style></head><body>
<header>
 <h1>逐档逆向选择 &amp; 照单全收做市 P&amp;L — 研究报告</h1>
 <div class="sub">Hyperliquid HIP-3 · Nado stock perps · markout / adverse-selection / 20min hedge</div>
</header>
<div class="tabs">
 <button id="b0" class="on" onclick="show('methodology.html',this)">① 方法论</button>
 <button id="b1" onclick="show('phase2_dynamic.html',this)">② 逐档 markout 逆向选择 (交互)</button>
 <button id="b2" onclick="show('nado_hedge.html',this)">③ 照单全收：Nado vs Hyperliquid · 对冲 vs 无对冲</button>
 <button id="b3" onclick="show('quote.html',this)">④ Nado 做市报价单</button>
</div>
<div class="note" id="note"><b>①</b> 方法论：以 Hyperliquid 为数据母体，校准 Nado↔HL 映射，估算每档每 $1 深度的月亏损率，反推报价单。</div>
<iframe id="frame" src="methodology.html" title="report"></iframe>
<script>
var NOTES={
 'methodology.html':'<b>①</b> 方法论：以 Hyperliquid 为数据母体，校准 Nado↔HL 映射（量×0.4%、毒性继承），按数据可得性分类目标票，算每 $1 深度月亏损率，反推报价单。',
 'phase2_dynamic.html':'<b>②</b> 选股票 / 档位(5–300bps) / x范围；逐秒 markout 曲线 + 首次归零★ + 固定20min的逐档 AS / 日均成交量 / 月度亏损 bar。<b>首次加载约 46MB，请稍候几秒。</b>',
 'nado_hedge.html':'<b>③</b> 吃下全部 taker 流的做市 P&amp;L：Nado(HIP-3对冲) 与 Hyperliquid(self-flatten)，每个含对冲/无对冲。Plotly 图例可点击只看 hedge 或 no-hedge。',
 'quote.html':'<b>④</b> 报价单：final cost=20min逆选+对冲成本；累计深度 cap 在 HL ZHIPU；每票给 1w/5w/10w 三档月费的逐层深度。'};
function show(u,btn){document.getElementById('frame').src=u;
 document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('on')});btn.classList.add('on');
 document.getElementById('note').innerHTML=NOTES[u];}
</script>
</body></html>
